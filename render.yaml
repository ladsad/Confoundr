services:
  - type: web
    name: confoundr-api
    env: docker
    region: ohio
    plan: free
    dockerCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: confoundr-redis
          property: connectionString

  - type: worker
    name: confoundr-worker
    env: docker
    region: ohio
    plan: free
    dockerCommand: "python -m api.worker"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: confoundr-redis
          property: connectionString

  - type: redis
    name: confoundr-redis
    region: ohio
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for internal connections
