services:
  - type: web
    name: confoundr-api
    env: docker
    region: ohio
    plan: free
    dockerCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: confoundr-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: confoundr-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: redis
    name: confoundr-redis
    region: ohio
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for internal connections

databases:
  - name: confoundr-db
    plan: free
    region: ohio
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for internal connections
